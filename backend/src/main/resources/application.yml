server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:movieticket;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: movieticket-jwt-secret-key-2026-super-secure-hash-256bit
  expiration: 86400000  # 24h
